<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscador de Fotos</title>

<!-- MSAL -->
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
input, button { margin:5px; padding:8px; }
</style>
</head>

<body>

<h2>Buscador de Fotos</h2>

<h3>Configuración</h3>
<label>Lista:</label>
<input id="lista" value="Fotos"><br><br>

<button onclick="login()">🔐 Iniciar sesión</button>
<button onclick="cargarFotos()">📸 Cargar fotos</button>

<h3>Resultado</h3>
<div id="resultado"></div>

<script>

// 🔐 CONFIG AZURE (YA LISTO CON TUS DATOS)
const msalConfig = {
  auth: {
    clientId: "16c752fe-553a-4b4c-b079-86a489b83a1d",
    authority: "https://login.microsoftonline.com/42999c7e-96b0-41b8-ac79-28db3dfddcae",
    redirectUri: "https://gentle-pond-02da37e10.7.azurestaticapps.net"
  }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

// LOGIN
async function login() {
  await msalInstance.loginPopup({
    scopes: ["https://graph.microsoft.com/.default"]
  });
  alert("✅ Sesión iniciada");
}

// OBTENER TOKEN
async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) {
    alert("Primero inicia sesión");
    return null;
  }

  const response = await msalInstance.acquireTokenSilent({
    account: accounts[0],
    scopes: ["https://graph.microsoft.com/.default"]
  });

  return response.accessToken;
}

// 📸 CARGAR FOTOS DESDE SHAREPOINT
async function cargarFotos() {

  const token = await getToken();
  if (!token) return;

  const lista = document.getElementById("lista").value;

  const url = `https://decoracionesamarillas.sharepoint.com/sites/General/_api/web/lists/getbytitle('${lista}')/items`;

  try {
    const res = await fetch(url, {
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/json;odata=verbose"
      }
    });

    const data = await res.json();

    mostrar(data.d.results);

  } catch (error) {
    console.error(error);
    alert("❌ Error al obtener datos");
  }
}

// MOSTRAR RESULTADO
function mostrar(items) {

  let html = "";

  items.forEach(item => {
    html += `<div style="margin-bottom:10px;">
      <b>${item.Title}</b><br>
    </div>`;
  });

  document.getElementById("resultado").innerHTML = html;
}

</script>

</body>
</html>
